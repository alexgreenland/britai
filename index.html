<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>BritAI</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <meta name="description" content="The directory and workspace to accelerate British AI." />
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="BritAI" />
    <meta property="og:title" content="BritAI" />
    <meta property="og:description" content="The directory and workspace to accelerate British AI." />
    <meta property="og:image" content="https://britai.net/static/britai-og.png" />
    <meta name="keywords" content="BritAI, British AI, BritAIn" />
    <style>
      html,body {
        margin: 0;
        padding: 0;
        font-family: system-ui, sans-serif;
        font-size: 21px;
      }

      a {
        color: #00f;
        text-decoration: none;
      }

      .page-content-container {
        width: 100%;

        @media (min-width: 950px) {
          width: 70%;
          margin: 0 auto;
        }
      }

      .logo-container {
        text-align: center;
      }

      .logo-container img {
         width: 20rem;
      }

      p.lead {
        font-size: 1.2rem;
      }

      .hero-lead {
        text-align: center;
      }

      .intro {
        text-align: center;
      }

      .directory-item {
        margin-bottom: 1rem;
      }

      .directory-item-icon {
        width: 3rem;
        height: 3rem;
      }

      .directory-suggestions {
        margin-top: 3rem;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="page-content-container">
        <div class="page-content">
          <div class="logo-container">
            <img src="/static/britai-logo.png" alt="BritAI logo">
          </div>

          <div class="intro">
          
            <p class="hero-lead lead">
                Welcome to BritAI. Welcome to BritAI<sup>n</sup>
            </p>
  
            <p>
                BritAI is the directory and workspace to accelerate British AI.
            </p>

          </div>

          <div class="directory-container">

            <div class="directory">
              <h2>Directory</h2>
              
              <div class="directory-item">
                <img class="directory-item-icon" src="/directory/epi/epi-icon.svg" alt="Epi logo icon">
                <h3>Epi</h3>
                <a href="https://epihq.com">epihq.com</a>
                <p>
                  Contrarian cybersecurity, phishing protection, QR phishing protection, web search. Powered by Epi AI.
                </p>
              </div>
              
            </div>

            <div class="directory-suggestions">
              <p>
                <a href="https://github.com/alexgreenland/britai">Suggest changes on GitHub</a>
              </p>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
